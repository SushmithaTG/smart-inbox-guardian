# App name
spring.application.name=smart-inbox-guardian-backend

# Database connection
spring.datasource.url=jdbc:mysql://localhost:3306/smart_inbox_guardian
spring.datasource.username=root
spring.datasource.password=

# This tells Spring Boot to automatically
# create tables from your Java classes
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (helpful for learning)
spring.jpa.show-sql=true

# Port
server.port=8080