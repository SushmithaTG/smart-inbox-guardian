# App name
spring.application.name=smart-inbox-guardian-backend

# Database connection
spring.datasource.url=jdbc:mysql://localhost:3306/smart_inbox_guardian
spring.datasource.username=YOUR_DATABASE_USERNAME
spring.datasource.password=YOUR_DATABASE_PASSWORD

# This tells Spring Boot to automatically
# create tables from your Java classes
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (helpful for learning)
spring.jpa.show-sql=true

spring.jpa.open-in-view=false


# Port
server.port=8080

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL_ADDRESS
spring.mail.password=YOUR_APP_PASSWORD

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true